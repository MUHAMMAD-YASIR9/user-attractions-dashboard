<div class="list-container mat-elevation-z2">

    <!-- Header Section -->
    <!-- Page Title -->
    <h4>User Management</h4>

    <!-- Actions Section -->
    <div class="actions">
        <button mat-raised-button color="primary" (click)="onAddUser()">
            <mat-icon>person_add</mat-icon>
            Add User
        </button>

        <mat-form-field appearance="outline" class="search-field">
            <mat-label>Search users</mat-label>
            <input matInput type="text" [(ngModel)]="searchTerm" (input)="onSearch()"
                placeholder="Search by name or email" />
            @if (searchTerm) {
            <button mat-icon-button matSuffix (click)="clearSearch()" aria-label="Clear">
                <mat-icon>close</mat-icon>
            </button>
            }
        </mat-form-field>
    </div>


    <!-- Table Section -->
    <div class="table-wrapper">
        <div class="table-wrapper" style="height:calc(100vh - 270px); overflow-y: auto;">
            <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)">

                <!-- ID Column -->
                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
                    <td mat-cell *matCellDef="let user"> {{ user.id }} </td>
                </ng-container>

                <!-- Avatar Column -->
                <ng-container matColumnDef="avatar">
                    <th mat-header-cell *matHeaderCellDef> Avatar </th>
                    <td mat-cell *matCellDef="let user">
                        <img [src]="user.avatar" alt="avatar" width="32" height="32" class="rounded-full" />
                    </td>
                </ng-container>

                <!-- First Name Column -->
                <ng-container matColumnDef="fname">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> First Name </th>
                    <td mat-cell *matCellDef="let user"> {{ user.fname }} </td>
                </ng-container>

                <!-- Last Name Column -->
                <ng-container matColumnDef="lname">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Last Name </th>
                    <td mat-cell *matCellDef="let user"> {{ user.lname }} </td>
                </ng-container>

                <!-- Username Column -->
                <ng-container matColumnDef="username">
                    <th mat-header-cell *matHeaderCellDef> Username </th>
                    <td mat-cell *matCellDef="let user"> {{ user.username }} </td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef> Actions </th>
                    <td mat-cell *matCellDef="let user">
                        <button mat-icon-button color="primary" aria-label="Edit" (click)="onEditUser(user.id)">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" aria-label="Delete" (click)="onDeleteUser(user.id)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <!-- Sticky Header Row -->
                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>
        <!-- Centered Pagination -->
        <mat-paginator [length]="totalItems" [pageSize]="pageSize" [pageIndex]="pageIndex"
            [pageSizeOptions]="[5, 10, 25]" (page)="onPageChange($event)" showFirstLastButtons>
        </mat-paginator>
    </div>

</div>
