<div class="pet-sales-container mat-elevation-z2">
    <h4>Pet Sales Statistics</h4>

    <div class="filter-section">
        <mat-form-field appearance="outline">
            <mat-label>Select Date</mat-label>
            <input matInput [matDatepicker]="picker" [(ngModel)]="selectedDate" (dateChange)="onDateChange()" />
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>
    </div>


    <div class="chart-wrapper">
        <div [chart]="weeklyChart"></div>
    </div>
    <div class="table-wrapper">

        <!-- Title Centered -->
        <h4 class="table-title">Daily Pet Sales</h4>
        <!-- Scrollable Table -->
        <div class="table-content" style="height: calc(100vh - 270px); overflow-y: auto;">
            <table mat-table [dataSource]="dataSource">

                <!-- Date -->
                <ng-container matColumnDef="date">
                    <th mat-header-cell *matHeaderCellDef> Date </th>
                    <td mat-cell *matCellDef="let sale"> {{ sale.date }} </td>
                </ng-container>

                <!-- Animal -->
                <ng-container matColumnDef="animal">
                    <th mat-header-cell *matHeaderCellDef> Animal </th>
                    <td mat-cell *matCellDef="let sale"> {{ sale.animal }} </td>
                </ng-container>

                <!-- Price -->
                <ng-container matColumnDef="price">
                    <th mat-header-cell *matHeaderCellDef> Price </th>
                    <td mat-cell *matCellDef="let sale"> {{ sale.price }} </td>
                </ng-container>

                <!-- Sticky Header & Rows -->
                <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
        </div>

        <!-- Pagination -->
        <mat-paginator [length]="totalItems" [pageSize]="pageSize" [pageIndex]="pageIndex"
            [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons>
        </mat-paginator>
    </div>

</div>
