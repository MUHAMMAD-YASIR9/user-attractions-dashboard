<div class="list-container mat-elevation-z2">

  <!-- Page Title -->
  <h4>Attractions Management</h4>

  <!-- Actions -->
  <div class="actions">
    <button mat-raised-button color="primary" (click)="onAddAttraction()">
      <mat-icon>add_location</mat-icon>
      Add Attraction
    </button>

    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search attractions</mat-label>
      <input
        matInput
        type="text"
        [(ngModel)]="searchTerm"
        (input)="onSearch()"
        placeholder="Search by name"
      />
      @if (searchTerm) {
        <button mat-icon-button matSuffix (click)="clearSearch()" aria-label="Clear">
          <mat-icon>close</mat-icon>
        </button>
      }
    </mat-form-field>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <div class="table-wrapper" style="height:calc(100vh - 270px); overflow-y: auto;">
      <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)">

        <!-- ID -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
          <td mat-cell *matCellDef="let item"> {{ item.id }} </td>
        </ng-container>

        <!-- Name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let item"> {{ item.name }} </td>
        </ng-container>

        <!-- Detail -->
        <ng-container matColumnDef="detail">
          <th mat-header-cell *matHeaderCellDef>Detail</th>
          <td mat-cell *matCellDef="let item"> {{ item.detail }} </td>
        </ng-container>

        <!-- Image -->
        <ng-container matColumnDef="coverimage">
          <th mat-header-cell *matHeaderCellDef>Image</th>
          <td mat-cell *matCellDef="let item">
            <img [src]="item.coverimage" alt="cover" width="40" height="40" style="border-radius: 4px;" />
          </td>
        </ng-container>

        <!-- Latitude -->
        <ng-container matColumnDef="latitude">
          <th mat-header-cell *matHeaderCellDef>Latitude</th>
          <td mat-cell *matCellDef="let item"> {{ item.latitude }} </td>
        </ng-container>

        <!-- Longitude -->
        <ng-container matColumnDef="longitude">
          <th mat-header-cell *matHeaderCellDef>Longitude</th>
          <td mat-cell *matCellDef="let item"> {{ item.longitude }} </td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let item">
            <button mat-icon-button color="primary" (click)="onEditAttraction(item.id)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="onDeleteAttraction(item.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>

    <!-- Pagination -->
    <mat-paginator
      [length]="totalItems"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="[5, 10, 25]"
      (page)="onPageChange($event)"
      showFirstLastButtons>
    </mat-paginator>
  </div>

</div>
